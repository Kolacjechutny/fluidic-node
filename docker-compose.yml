version: "3.8"
services:
  fluidic-node:
    image: us-central1-docker.pkg.dev/project-934c3e12-e0e7-4811-810/fluidic/mesh-node:latest
    container_name: fluidic-node
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7000:7000"
    environment:
      # Set a unique numeric ID in your .env file, e.g. OSCILLATOR_ID=12345.
      # Reusing the default node-1 across machines causes the operators to slash
      # each other because they share the same keypair.
      - OSCILLATOR_ID=${OSCILLATOR_ID}
      - API_PORT=8080
      - BIND_ADDR=0.0.0.0:7000
      - PEERS=${PEERS:-34.56.159.76:7000}
      - SYNTHESIS_INTERVAL_MS=${SYNTHESIS_INTERVAL_MS:-1000}
      - FLUIDIC_DATA_DIR=/data
    volumes:
      - fluidic-data:/data

volumes:
  fluidic-data:
